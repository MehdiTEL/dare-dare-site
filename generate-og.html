<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px; height: 630px; overflow: hidden;
      background: #0A0A0A; color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .content {
      text-align: center; max-width: 900px; padding: 0 60px;
      z-index: 2;
    }
    .logo {
      font-weight: 700; font-size: 18px; text-transform: uppercase;
      letter-spacing: 0.3em; color: rgba(255,255,255,0.5);
      margin-bottom: 40px;
    }
    h1 {
      font-weight: 700; font-size: 56px; line-height: 1.1;
      letter-spacing: -0.03em; margin-bottom: 24px;
    }
    .subtitle {
      font-weight: 300; font-size: 20px; color: rgba(255,255,255,0.6);
      line-height: 1.6;
    }
    .cities {
      margin-top: 40px; font-weight: 500; font-size: 13px;
      text-transform: uppercase; letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
    }
    .cities span { margin: 0 12px; font-size: 6px; vertical-align: middle; }
    .border {
      position: absolute; inset: 24px;
      border: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div class="border"></div>
  <div class="content">
    <div class="logo">Dare-Dare</div>
    <h1>L'audace au service de vos événements</h1>
    <div class="subtitle">Production événementielle sur-mesure — Séminaires, lancements, influence, voyages presse</div>
    <div class="cities">Paris <span>◆</span> Cannes <span>◆</span> Maroc</div>
  </div>
</body>
</html>
